<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="32" rx="14" fill="url(#shine)"/>

  <!-- Prédio -->
  <rect x="12" y="18" width="40" height="38" rx="2" fill="none" stroke="white" stroke-width="2.5"/>
  <line x1="12" y1="32" x2="52" y2="32" stroke="white" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="12" y1="44" x2="52" y2="44" stroke="white" stroke-width="1.2" stroke-opacity="0.35"/>

  <!-- Janelas andar 1 -->
  <rect x="16" y="21" width="7" height="8" rx="1" fill="white" fill-opacity="0.95"/>
  <rect x="28" y="21" width="7" height="8" rx="1" fill="white" fill-opacity="0.55"/>
  <rect x="40" y="21" width="7" height="8" rx="1" fill="white" fill-opacity="0.8"/>

  <!-- Janelas andar 2 -->
  <rect x="16" y="35" width="7" height="7" rx="1" fill="white" fill-opacity="0.55"/>
  <rect x="28" y="35" width="7" height="7" rx="1" fill="white" fill-opacity="0.9"/>
  <rect x="40" y="35" width="7" height="7" rx="1" fill="white" fill-opacity="0.45"/>

  <!-- Porta -->
  <rect x="24" y="46" width="16" height="10" rx="2" fill="white" fill-opacity="0.85"/>
</svg>
