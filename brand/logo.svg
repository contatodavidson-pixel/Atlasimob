<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- ── Ícone: fundo arredondado ── -->
  <rect x="0" y="4" width="64" height="64" rx="14" fill="url(#bgGrad)"/>
  <rect x="0" y="4" width="64" height="32" rx="14" fill="url(#glowGrad)"/>

  <!-- ── Prédio principal ── -->
  <rect x="12" y="20" width="40" height="38" rx="2" fill="none" stroke="white" stroke-width="2.5"/>

  <!-- Linhas de andares -->
  <line x1="12" y1="34" x2="52" y2="34" stroke="white" stroke-width="1.2" stroke-opacity="0.4"/>
  <line x1="12" y1="46" x2="52" y2="46" stroke="white" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- Janelas — andar 1 -->
  <rect x="16" y="23" width="7" height="8" rx="1" fill="white" fill-opacity="0.95"/>
  <rect x="28" y="23" width="7" height="8" rx="1" fill="white" fill-opacity="0.6"/>
  <rect x="40" y="23" width="7" height="8" rx="1" fill="white" fill-opacity="0.85"/>

  <!-- Janelas — andar 2 -->
  <rect x="16" y="37" width="7" height="7" rx="1" fill="white" fill-opacity="0.6"/>
  <rect x="28" y="37" width="7" height="7" rx="1" fill="white" fill-opacity="0.9"/>
  <rect x="40" y="37" width="7" height="7" rx="1" fill="white" fill-opacity="0.5"/>

  <!-- Porta -->
  <rect x="24" y="48" width="16" height="10" rx="2" fill="white" fill-opacity="0.85"/>

  <!-- Detalhe AI no ícone -->
  <text x="30" y="14" font-family="Arial, sans-serif" font-size="7" font-weight="bold"
        fill="white" fill-opacity="0.5" text-anchor="middle" letter-spacing="2">AI</text>

  <!-- ── Texto: RealEstate ── -->
  <text x="80" y="36" font-family="Arial Black, Arial, sans-serif" font-size="26"
        font-weight="900" fill="#0f172a" letter-spacing="-0.5">Real</text>
  <text x="80" y="36" font-family="Arial Black, Arial, sans-serif" font-size="26"
        font-weight="900" fill="#0f172a" letter-spacing="-0.5">
    <tspan>Real</tspan><tspan fill="#1e3a8a">Estate</tspan>
  </text>

  <!-- ── Texto: AI ── -->
  <text x="231" y="36" font-family="Arial Black, Arial, sans-serif" font-size="26"
        font-weight="900" fill="#2563eb" letter-spacing="-0.5">AI</text>

  <!-- ── Tagline ── -->
  <text x="80" y="54" font-family="Arial, sans-serif" font-size="10.5" fill="#64748b"
        letter-spacing="0.3">Filtro Inteligente de Oportunidades Imobiliárias</text>

  <!-- Linha decorativa sob a tagline -->
  <line x1="80" y1="59" x2="316" y2="59" stroke="#e2e8f0" stroke-width="1"/>
</svg>
