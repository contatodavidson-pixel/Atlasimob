  <!-- ── Contatos ── -->
  <!-- Email -->
  <g transform="translate(46, 306)">
    <!-- Ícone email -->
    <rect width="20" height="14" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <polyline points="0,0 10,8 20,0" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="30" y="11" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">contato@realestateai.com.br</text>
  </g>

  <!-- WhatsApp -->
  <g transform="translate(46, 342)">
    <!-- Ícone WhatsApp simplificado -->
    <circle cx="10" cy="8" r="9" fill="none" stroke="#25d366" stroke-width="1.5"/>
    <path d="M6,8 Q6,4 10,4 Q14,4 14,8 Q14,11 12,12 L10,14 L8,12 Q6,11 6,8Z"
          fill="none" stroke="#25d366" stroke-width="1.3"/>
    <text x="30" y="13" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">+55 (11) 9 9999-9999</text>
  </g>

  <!-- Website -->
  <g transform="translate(46, 378)">
    <!-- Ícone globo simplificado -->
    <circle cx="10" cy="9" r="9" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <ellipse cx="10" cy="9" rx="4.5" ry="9" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
    <line x1="1" y1="9" x2="19" y2="9" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="30" y="14" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">realestateai.com.br</text>
  </g>

