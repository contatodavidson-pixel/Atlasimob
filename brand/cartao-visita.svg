<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 540" width="850" height="540">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="blueLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="decorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.04"/>
    </linearGradient>
    <clipPath id="cardClip">
      <rect width="850" height="540" rx="22"/>
    </clipPath>
  </defs>

  <!-- ── Fundo ── -->
  <rect width="850" height="540" rx="22" fill="url(#cardBg)"/>

  <!-- ── Decoração: prédios abstratos canto direito ── -->
  <g clip-path="url(#cardClip)" opacity="1">
    <!-- Prédio fundo 1 -->
    <rect x="620" y="160" width="70" height="380" rx="4" fill="url(#decorGrad)"/>
    <!-- Prédio fundo 2 -->
    <rect x="700" y="220" width="55" height="320" rx="4" fill="url(#decorGrad)"/>
    <!-- Prédio fundo 3 -->
    <rect x="762" y="130" width="88" height="410" rx="4" fill="url(#decorGrad)"/>
    <!-- Prédio frente -->
    <rect x="660" y="280" width="90" height="260" rx="4" fill="url(#decorGrad)"/>
    <!-- Janelas prédio 1 -->
    <rect x="630" y="190" width="12" height="10" rx="1" fill="#2563eb" fill-opacity="0.25"/>
    <rect x="648" y="190" width="12" height="10" rx="1" fill="#2563eb" fill-opacity="0.15"/>
    <rect x="630" y="210" width="12" height="10" rx="1" fill="#2563eb" fill-opacity="0.2"/>
    <rect x="648" y="210" width="12" height="10" rx="1" fill="#2563eb" fill-opacity="0.3"/>
    <rect x="630" y="230" width="12" height="10" rx="1" fill="#2563eb" fill-opacity="0.12"/>
    <rect x="648" y="230" width="12" height="10" rx="1" fill="#2563eb" fill-opacity="0.25"/>
    <!-- Janelas prédio 3 -->
    <rect x="774" y="150" width="14" height="11" rx="1" fill="#3b82f6" fill-opacity="0.2"/>
    <rect x="794" y="150" width="14" height="11" rx="1" fill="#3b82f6" fill-opacity="0.12"/>
    <rect x="774" y="172" width="14" height="11" rx="1" fill="#3b82f6" fill-opacity="0.28"/>
    <rect x="794" y="172" width="14" height="11" rx="1" fill="#3b82f6" fill-opacity="0.15"/>
    <rect x="774" y="194" width="14" height="11" rx="1" fill="#3b82f6" fill-opacity="0.1"/>
    <rect x="794" y="194" width="14" height="11" rx="1" fill="#3b82f6" fill-opacity="0.22"/>
    <!-- Linha de chão -->
    <line x1="600" y1="540" x2="850" y2="540" stroke="#2563eb" stroke-width="1" stroke-opacity="0.2"/>
  </g>

  <!-- ── Barra azul lateral esquerda ── -->
  <rect x="0" y="0" width="10" height="540" rx="0" fill="url(#blueLine)"/>
  <rect x="0" y="0" width="10" height="540" rx="0" fill="url(#blueLine)"/>
  <!-- Arredondamento só no lado esquerdo -->
  <rect x="0" y="0" width="22" height="540" rx="22" fill="url(#blueLine)"/>
  <rect x="10" y="0" width="12" height="540" fill="url(#cardBg)"/>

  <!-- ── Logo: ícone ── -->
