  <!-- Prédio ícone -->
  <rect x="58" y="70" width="44" height="42" rx="2" fill="none" stroke="white" stroke-width="2.6"/>
  <line x1="58" y1="83" x2="102" y2="83" stroke="white" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="58" y1="94" x2="102" y2="94" stroke="white" stroke-width="1.2" stroke-opacity="0.35"/>
  <!-- Janelas ícone -->
