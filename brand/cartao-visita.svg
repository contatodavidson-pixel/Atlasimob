  <rect x="74" y="73" width="8" height="8" rx="1" fill="white" fill-opacity="0.55"/>
  <rect x="86" y="73" width="8" height="8" rx="1" fill="white" fill-opacity="0.8"/>
  <rect x="62" y="86" width="8" height="7" rx="1" fill="white" fill-opacity="0.5"/>
  <rect x="74" y="86" width="8" height="7" rx="1" fill="white" fill-opacity="0.9"/>
  <rect x="86" y="86" width="8" height="7" rx="1" fill="white" fill-opacity="0.4"/>
  <!-- Porta ícone -->
  <rect x="70" y="101" width="18" height="11" rx="1.5" fill="white" fill-opacity="0.85"/>

  <!-- ── Logo: texto ── -->
  <text x="128" y="96" font-family="Arial Black, Arial, sans-serif" font-size="30"
